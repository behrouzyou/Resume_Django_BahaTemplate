{% load jalali_tags %}
{% load static %}
<div class="page pt-blog" data-simplebar>
    <section class="container">

        <div class="header-page mt-70 mob-mt">
            <h2>بلاگ</h2>
            <span></span>
        </div>

        <div class="row blog-masonry mt-100 mb-50">
            {% for post in posts %}
            <div class="col-lg-4 col-sm-6">
                <div class="blog-item">
                    <div class="thumbnail">
                        <!-- استفاده از onclick برای فورس کردن ریدایرکت -->
                        <a href="javascript:void(0);" onclick="window.location.href='{{ post.get_absolute_url }}'">
                            {% if post.image %}
                                <img alt="{{ post.title }}" src="{{ post.image.url }}">
                            {% endif %}
                        </a>
                    </div>
                    <h4>
                        <a href="javascript:void(0);" onclick="window.location.href='{{ post.get_absolute_url }}'">
                            {{ post.title }}
                        </a>
                    </h4>
                    <ul>
                        <li><a href="#">{{ post.created_at|to_jalali:'%d %B %Y' }}</a></li>
                        {% if post.category %}
                        <li><a href="#">{{ post.category.name }}</a></li>
                        {% endif %}
                    </ul>
                    <div class="blog-btn">
                        <!-- دکمه اصلی -->
                        <a href="javascript:void(0);" onclick="window.location.href='{{ post.get_absolute_url }}'" class="btn-st">بیشتر بخوانید</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>

        <div class="row mt-60 mb-90">
            <div class="col-lg-12 col-sm-12 text-center">
                <a href="{% url 'blog:post_list' %}" class="btn-st">مشاهده همه مطالب بلاگ</a>
            </div>
        </div>

    </section>
</div>
