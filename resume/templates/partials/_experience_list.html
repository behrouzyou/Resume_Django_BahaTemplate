<div class="experience box-1">
    {% for item in items %}
        <div class="item">
            <div class="main">
                <h4>{{ item.title }}</h4>
                <p><i class="far fa-calendar-alt"></i>
                    {{ item.start_year }} - {{ item.end_year }}
                    {% if item.company_or_field %}| {{ item.company_or_field }}{% endif %}
                </p>
            </div>
            <p>{{ item.description }}</p>
        </div>
    {% endfor %}
</div>
