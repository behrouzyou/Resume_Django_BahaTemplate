<!-- Interests Row Start -->
<div class="row mt-100">
  <!-- Header Block -->
  <div class="col-md-12">
    <div class="header-box mb-50">
      <h3>علایق من</h3>
    </div>
  </div>

  {% for item in interest %}
  <div class="col-lg-12 col-sm-12">
    <div class="box-2">
      <div class="row">
        <!-- Interests Item -->
        <div class="col-lg-3 col-sm-6">
          <div class="inter-icon">
            <i class="{{item.icon_class}}"></i>
            <div class="desc-inter">
              <h6>{{item.title}}</h6>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  {% endfor %}
</div>
